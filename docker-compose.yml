version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: smart-team-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - smart-team-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      PORT: 5001
      MONGO_URI: mongodb://admin:admin@mongodb:27017/smart-team-auth?authSource=admin
      JWT_SECRET: your_jwt_secret_key_change_in_production
      NODE_ENV: production
    ports:
      - "5001:5001"
    depends_on:
      - mongodb
    networks:
      - smart-team-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      PORT: 5002
      MONGO_URI: mongodb://admin:admin@mongodb:27017/smart-team-user?authSource=admin
      JWT_SECRET: your_jwt_secret_key_change_in_production
      NODE_ENV: production
    ports:
      - "5002:5002"
    depends_on:
      - mongodb
    networks:
      - smart-team-network

  project-service:
    build:
      context: ./project-service
      dockerfile: Dockerfile
    container_name: project-service
    environment:
      PORT: 5003
      MONGO_URI: mongodb://admin:admin@mongodb:27017/smart-team-project?authSource=admin
      JWT_SECRET: your_jwt_secret_key_change_in_production
      NODE_ENV: production
    ports:
      - "5003:5003"
    depends_on:
      - mongodb
    networks:
      - smart-team-network

  task-service:
    build:
      context: ./task-service
      dockerfile: Dockerfile
    container_name: task-service
    environment:
      PORT: 5004
      MONGO_URI: mongodb://admin:admin@mongodb:27017/smart-team-task?authSource=admin
      JWT_SECRET: your_jwt_secret_key_change_in_production
      NODE_ENV: production
    ports:
      - "5004:5004"
    depends_on:
      - mongodb
    networks:
      - smart-team-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      PORT: 5005
      MONGO_URI: mongodb://admin:admin@mongodb:27017/smart-team-notification?authSource=admin
      JWT_SECRET: your_jwt_secret_key_change_in_production
      NODE_ENV: production
    ports:
      - "5005:5005"
    depends_on:
      - mongodb
    networks:
      - smart-team-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      PORT: 5000
      AUTH_SERVICE_URL: http://auth-service:5001
      USER_SERVICE_URL: http://user-service:5002
      PROJECT_SERVICE_URL: http://project-service:5003
      TASK_SERVICE_URL: http://task-service:5004
      NOTIFICATION_SERVICE_URL: http://notification-service:5005
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      - auth-service
      - user-service
      - project-service
      - task-service
      - notification-service
    networks:
      - smart-team-network

volumes:
  mongo_data:

networks:
  smart-team-network:
    driver: bridge
